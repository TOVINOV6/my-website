<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
  text-align: center;
}

/* Profile */
.profile {
  margin-top: 60px;
}

.profile img {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  border: 4px solid white;
  box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

/* Title */
h1 {
  margin: 15px 0 5px;
  font-size: 28px;
}

p {
  opacity: 0.8;
}

/* Button */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 25px;
  background: linear-gradient(45deg, #ff416c, #ff4b2b);
  color: white;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* Cards */
.container {
  margin-top: 50px;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.1);
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

.card:hover {
  transform: scale(1.05);
  transition: 0.3s;
}
</style>
</head>

<body>

<div class="profile">
  <img src="https://telegra.ph/file/fcf186dbbdbb069c55b36-156f66a09aeb33dd3b.jpg">
  <h1>🔥 My Website 🔥</h1>
  <p>Welcome to my world 😎</p>

  <a href="https://t.me/+btTxImFRNpBjOGY1" class="btn">Join Telegram 🚀</a>
</div>

<div class="container">

  <div class="card">
    <h2>🎬 Movies</h2>
    <p>Latest Movies Available</p>
  </div>

  <div class="card">
    <h2>📺 Series</h2>
    <p>Trending Web Series</p>
  </div>

  <div class="card">
    <h2>📥 Downloads</h2>
    <p>Fast Download Links</p>
  </div>

</div>

</body>
</html>
