<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 80px;
    }

    img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 4px solid white;
      object-fit: cover;
    }

    h1 {
      margin-top: 20px;
      font-size: 30px;
    }

    p {
      color: #ddd;
      font-size: 18px;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: white;
      color: #2a5298;
      font-size: 16px;
      border-radius: 25px;
      cursor: pointer;
    }

    .btn:hover {
      background: #ddd;
    }
  </style>
</head>

<body>

  <div class="container">
    
    <!-- 🔥 Photo ഇവിടെ മാറ്റണം -->
    <img src="https://telegra.ph/file/fcf186dbbdbb069c55b36-156f66a09aeb33dd3b.jpg" alt="My Photo">

    <h1>🔥 My Website 🔥</h1>
    <p>Welcome to my page 😎</p>

    <button class="btn">Follow Me</button>

  </div>

</body>
</html>
